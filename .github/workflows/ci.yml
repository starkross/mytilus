name: CI

on:
  push:
    branches: [main]
  pull_request:

# All jobs must complete green; keeps the gates in CI identical to what
# `task ci` runs locally so contributors get matching signal pre-push.

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Pretty colors in cargo output even though we redirect to GH log buffers.
  CLICOLOR: 1

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Formatting — fast feedback. No cargo deps needed; just rustfmt.
  # ──────────────────────────────────────────────────────────────────────
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      # Picks up nightly + components from rust-toolchain.toml.
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: task fmt:check
        run: task fmt:check

  # ──────────────────────────────────────────────────────────────────────
  # Host-side: unit tests + clippy on the runner's native toolchain
  # (x86_64-unknown-linux-gnu). Tests can't exercise the syscall path —
  # syscall stubs panic with `unimplemented!()` outside aarch64-linux —
  # but they cover all the pure / pointer / struct-layout code, which is
  # the bulk of what we have so far. Real syscall coverage waits for
  # `task test:qemu`.
  # ──────────────────────────────────────────────────────────────────────
  host:
    name: host (test + clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2
        with:
          # Separate cache from `cross` because the target dir layout
          # differs (host vs aarch64-unknown-linux-mytilus).
          shared-key: host

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: task clippy:host
        run: task clippy:host

      - name: task test
        run: task test

  # ──────────────────────────────────────────────────────────────────────
  # Cross-target: aarch64-unknown-linux-mytilus.
  # Validates the real ship target via `cargo check` + `cargo clippy` +
  # `cargo build` against the custom JSON spec, with -Z build-std for
  # the no-prebuilt-sysroot custom target. This is the gate that catches
  # ABI / target-spec / asm regressions before they hit `task build`.
  # ──────────────────────────────────────────────────────────────────────
  cross:
    name: cross (aarch64-unknown-linux-mytilus)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cross

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: task check
        run: task check

      - name: task clippy
        run: task clippy

      - name: task build
        run: task build

  # ──────────────────────────────────────────────────────────────────────
  # Real-world canary: try to build runc against mytilus as libc.
  # This is intentionally non-blocking while `task install` and the libc
  # artifacts are still placeholders; once mytilus produces libc.a, crt*.o,
  # and headers, drop `continue-on-error` and let this become a hard gate.
  # ──────────────────────────────────────────────────────────────────────
  runc:
    name: runc (mytilus libc canary)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: cross
    continue-on-error: true
    env:
      MYTILUS_PREFIX: ${{ github.workspace }}/dist/mytilus
      RUNC_REF: main
      RUNC_REPO: https://github.com/opencontainers/runc.git
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build mytilus
        run: task build

      - name: Stage mytilus sysroot
        run: |
          set -euxo pipefail
          mkdir -p "${MYTILUS_PREFIX}/bin" "${MYTILUS_PREFIX}/lib" "${MYTILUS_PREFIX}/include"

          missing=()
          for artifact in libc.a crt1.o crti.o crtn.o Scrt1.o rcrt1.o; do
            path="$(find target/aarch64-unknown-linux-mytilus/release -name "${artifact}" -print -quit)"
            if [ -n "${path}" ]; then
              cp "${path}" "${MYTILUS_PREFIX}/lib/${artifact}"
            else
              missing+=("${artifact}")
            fi
          done

          cp -a headers/. "${MYTILUS_PREFIX}/include/"

          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::warning::Skipping runc canary; mytilus sysroot is missing: %s\n' "${missing[*]}"
            echo "MYTILUS_SYSROOT_READY=false" >> "${GITHUB_ENV}"
          else
            echo "MYTILUS_SYSROOT_READY=true" >> "${GITHUB_ENV}"
          fi

      - name: Check out runc
        if: env.MYTILUS_SYSROOT_READY == 'true'
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch "${RUNC_REF}" "${RUNC_REPO}" _runc

      - uses: actions/setup-go@v5
        if: env.MYTILUS_SYSROOT_READY == 'true'
        with:
          go-version-file: _runc/go.mod

      - name: Install runc build tools
        if: env.MYTILUS_SYSROOT_READY == 'true'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang lld make pkg-config

      - name: Create mytilus C compiler wrapper
        if: env.MYTILUS_SYSROOT_READY == 'true'
        run: |
          set -euxo pipefail
          cat > "${MYTILUS_PREFIX}/bin/aarch64-linux-mytilus-clang" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          prefix="$(cd "$(dirname "${BASH_SOURCE[0]}")/.." && pwd)"
          exec clang \
            --target=aarch64-unknown-linux-musl \
            -fuse-ld=lld \
            -nostdinc \
            -isystem "${prefix}/include" \
            -B "${prefix}/lib" \
            -L "${prefix}/lib" \
            "$@"
          EOF
          chmod +x "${MYTILUS_PREFIX}/bin/aarch64-linux-mytilus-clang"

      - name: Build runc with mytilus libc
        if: env.MYTILUS_SYSROOT_READY == 'true'
        working-directory: _runc
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: arm64
          CC: ${{ env.MYTILUS_PREFIX }}/bin/aarch64-linux-mytilus-clang
          RUNC_BUILDTAGS: runc_nocriu -seccomp -libpathrs
        run: make static
