name: CI

on:
  push:
    branches: [main]
  pull_request:

# All jobs must complete green; keeps the gates in CI identical to what
# `task ci` runs locally so contributors get matching signal pre-push.

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Pretty colors in cargo output even though we redirect to GH log buffers.
  CLICOLOR: 1

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Formatting — fast feedback. No cargo deps needed; just rustfmt.
  # ──────────────────────────────────────────────────────────────────────
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      # Picks up nightly + components from rust-toolchain.toml.
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: task fmt:check
        run: task fmt:check

  # ──────────────────────────────────────────────────────────────────────
  # Host-side: unit tests + clippy on the runner's native toolchain
  # (x86_64-unknown-linux-gnu). Tests can't exercise the syscall path —
  # syscall stubs panic with `unimplemented!()` outside aarch64-linux —
  # but they cover all the pure / pointer / struct-layout code, which is
  # the bulk of what we have so far. Real syscall coverage waits for
  # `task test:qemu`.
  # ──────────────────────────────────────────────────────────────────────
  host:
    name: host (test + clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2
        with:
          # Separate cache from `cross` because the target dir layout
          # differs (host vs aarch64-unknown-linux-mytilus).
          shared-key: host

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: task clippy:host
        run: task clippy:host

      - name: task test
        run: task test

  # ──────────────────────────────────────────────────────────────────────
  # Cross-target: aarch64-unknown-linux-mytilus.
  # Validates the real ship target via `cargo check` + `cargo clippy` +
  # `cargo build` against the custom JSON spec, with -Z build-std for
  # the no-prebuilt-sysroot custom target. This is the gate that catches
  # ABI / target-spec / asm regressions before they hit `task build`.
  # ──────────────────────────────────────────────────────────────────────
  cross:
    name: cross (aarch64-unknown-linux-mytilus)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cross

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: task check
        run: task check

      - name: task clippy
        run: task clippy

      - name: task build
        run: task build

  # ──────────────────────────────────────────────────────────────────────
  # Integration smoke: build runc with our libc as the ONLY C runtime
  # dependency (dynamic link).
  #
  # Requirements this checks on the produced aarch64 binary:
  #   1) PT_INTERP = /lib/ld-musl-aarch64.so.1
  #   2) No glibc / musl runtime NEEDED entries
  #   3) libc dependency resolves to our staged libc.so
  # ──────────────────────────────────────────────────────────────────────
  runc:
    name: runc (aarch64, dynamic, mytilus libc only)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: runc

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install cross toolchain + ELF utils
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Build and stage mytilus sysroot
        env:
          PREFIX: ${{ github.workspace }}/dist
        run: |
          task install
          # musl-compatible loader name; in musl this is a symlink to libc.so.
          ln -sf libc.so "$PREFIX/lib/ld-musl-aarch64.so.1"

      - name: Clone runc
        run: git clone --depth 1 https://github.com/opencontainers/runc.git _runc

      - name: Build runc against staged mytilus libc (dynamic)
        working-directory: _runc
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: '1'
          CC: aarch64-linux-gnu-gcc
          SYSROOT: ${{ github.workspace }}/dist
        run: |
          go build \
            -trimpath \
            -o runc.mytilus \
            -ldflags "-linkmode external -extldflags '--sysroot=${SYSROOT} -nostdlib -L${SYSROOT}/lib -Wl,--dynamic-linker=/lib/ld-musl-aarch64.so.1 -Wl,-rpath,/lib -lc'" \
            ./

      - name: Verify dynamic linkage policy (no glibc/musl; only our libc)
        working-directory: _runc
        run: |
          set -euo pipefail

          echo "== readelf: interpreter =="
          aarch64-linux-gnu-readelf -lW runc.mytilus | tee interp.txt
          grep -q "Requesting program interpreter: /lib/ld-musl-aarch64.so.1" interp.txt

          echo "== readelf: dynamic deps =="
          aarch64-linux-gnu-readelf -dW runc.mytilus | tee dynamic.txt

          # Must not depend on glibc or a musl-provided libc soname.
          if grep -Eq 'NEEDED.*(libc\.so\.6|ld-linux|libc\.musl|musl)' dynamic.txt; then
            echo "unexpected glibc/musl dependency found"
            exit 1
          fi

          # Must depend ONLY on plain libc.so (our staged soname).
          mapfile -t needed < <(grep 'NEEDED' dynamic.txt | sed -E 's/.*\[(.*)\].*/\1/')
          printf 'NEEDED: %s\n' "${needed[@]}"
          test "${#needed[@]}" -eq 1
          test "${needed[0]}" = "libc.so"

      - name: Upload runc binary + ELF reports
        uses: actions/upload-artifact@v4
        with:
          name: runc-mytilus-aarch64
          path: |
            _runc/runc.mytilus
            _runc/interp.txt
            _runc/dynamic.txt
