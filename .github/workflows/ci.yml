name: CI

on:
  push:
    branches: [main]
  pull_request:

# All jobs must complete green; keeps the gates in CI identical to what
# `task ci` runs locally so contributors get matching signal pre-push.

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Pretty colors in cargo output even though we redirect to GH log buffers.
  CLICOLOR: 1

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Formatting — fast feedback. No cargo deps needed; just rustfmt.
  # ──────────────────────────────────────────────────────────────────────
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      # Picks up nightly + components from rust-toolchain.toml.
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: task fmt:check
        run: task fmt:check

  # ──────────────────────────────────────────────────────────────────────
  # Host-side: unit tests + clippy on the runner's native toolchain
  # (x86_64-unknown-linux-gnu). Tests can't exercise the syscall path —
  # syscall stubs panic with `unimplemented!()` outside aarch64-linux —
  # but they cover all the pure / pointer / struct-layout code, which is
  # the bulk of what we have so far. Real syscall coverage waits for
  # `task test:qemu`.
  # ──────────────────────────────────────────────────────────────────────
  host:
    name: host (test + clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2
        with:
          # Separate cache from `cross` because the target dir layout
          # differs (host vs aarch64-unknown-linux-mytilus).
          shared-key: host

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: task clippy:host
        run: task clippy:host

      - name: task test
        run: task test

  # ──────────────────────────────────────────────────────────────────────
  # Cross-target: aarch64-unknown-linux-mytilus.
  # Validates the real ship target via `cargo check` + `cargo clippy` +
  # `cargo build` against the custom JSON spec, with -Z build-std for
  # the no-prebuilt-sysroot custom target. This is the gate that catches
  # ABI / target-spec / asm regressions before they hit `task build`.
  # ──────────────────────────────────────────────────────────────────────
  cross:
    name: cross (aarch64-unknown-linux-mytilus)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cross

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: task check
        run: task check

      - name: task clippy
        run: task clippy

      - name: task build
        run: task build

  # ──────────────────────────────────────────────────────────────────────
  # Integration gate: build runc as aarch64 Linux PIE dynamically linked
  # against mytilus only (no glibc, no system musl).
  # ──────────────────────────────────────────────────────────────────────
  runc:
    name: runc (dynamic link against mytilus)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + stage mytilus sysroot
        run: |
          task install PREFIX="$PWD/dist"
          ln -sf libc.so dist/lib/ld-musl-aarch64.so.1

      - name: Create mytilus aarch64 C toolchain wrapper
        run: |
          mkdir -p "$PWD/dist/bin"
          cat > "$PWD/dist/bin/aarch64-linux-muslrs-gcc" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          : "${MUSLRS_SYSROOT:?MUSLRS_SYSROOT is not set}"
          exec clang \
            --target=aarch64-unknown-linux-gnu \
            -fuse-ld=lld \
            --sysroot="${MUSLRS_SYSROOT}" \
            -isystem "${MUSLRS_SYSROOT}/include" \
            -L"${MUSLRS_SYSROOT}/lib" \
            -B"${MUSLRS_SYSROOT}/lib" \
            -Wl,--dynamic-linker=/lib/ld-musl-aarch64.so.1 \
            -Wl,-rpath-link,"${MUSLRS_SYSROOT}/lib" \
            "$@"
          EOF
          chmod +x "$PWD/dist/bin/aarch64-linux-muslrs-gcc"

      - name: Checkout runc
        uses: actions/checkout@v4
        with:
          repository: opencontainers/runc
          path: runc

      - name: Build runc (linux/arm64, dynamic, external linker)
        env:
          MUSLRS_SYSROOT: ${{ github.workspace }}/dist
        run: |
          cd runc
          export PATH="$GITHUB_WORKSPACE/dist/bin:$PATH"
          export GOOS=linux
          export GOARCH=arm64
          export CGO_ENABLED=1
          export CC=aarch64-linux-muslrs-gcc
          go build \
            -buildmode=pie \
            -trimpath \
            -ldflags='-linkmode=external' \
            -o runc \
            ./

      - name: Verify dynamic linker and NEEDED deps
        run: |
          readelf -l runc/runc | tee /tmp/runc-phdr.txt
          readelf -d runc/runc | tee /tmp/runc-dyn.txt

          grep -F 'Requesting program interpreter: /lib/ld-musl-aarch64.so.1' /tmp/runc-phdr.txt

          needed_lines=$(grep -F '(NEEDED)' /tmp/runc-dyn.txt || true)
          echo "$needed_lines"

          # Must link only against our libc.so (no glibc, no upstream musl,
          # no extra runtime libs).
          [ "$(echo "$needed_lines" | wc -l | tr -d ' ')" = "1" ]
          echo "$needed_lines" | grep -F 'Shared library: [libc.so]'

          if grep -E 'libc\.so\.6|ld-linux|libmusl' /tmp/runc-dyn.txt; then
            echo 'unexpected glibc/system-musl dependency detected'
            exit 1
          fi
